<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Retail</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: scale(1.02);
        }

        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .product-info {
            padding: 0.75rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-brand {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0.25rem 0;
            line-height: 1.2;
            flex-grow: 1;
        }

        .product-price {
            font-weight: bold;
            color: var(--accent);
        }

        .header-actions {
            position: absolute;
            right: 1rem;
            top: 1.25rem;
        }

        .btn-login {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 350px;
        }

        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <header class="navbar">
            <h1 class="store-name">Smart Retail</h1>
            <div class="header-actions">
                <button class="btn-login" id="login-btn">Staff Login</button>
            </div>
        </header>

        <main>
            <div style="padding: 1rem 1rem 0; color: var(--text-muted); font-size: 0.9rem;">Browse our catalog</div>
            <div class="grid-container" id="product-grid">
                <!-- Products injected here -->
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="login-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Salesperson Login</h2>
            <input type="text" id="staff-name" placeholder="Your Name">
            <input type="password" id="staff-pin" placeholder="PIN (Try 1234)">
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-primary" id="submit-login" style="flex: 1; padding: 0.75rem;">Login</button>
                <button class="btn" id="cancel-login"
                    style="flex: 1; padding: 0.75rem; background: var(--card-border); color: white;">Cancel</button>
            </div>
            <div id="login-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 0.5rem; display: none;">Invalid
                PIN!</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Products
            try {
                const res = await fetch('products.json');
                const products = await res.json();
                const grid = document.getElementById('product-grid');

                for (const [id, prod] of Object.entries(products)) {
                    grid.innerHTML += `
                        <a href="product.html?id=${id}" class="product-card">
                            <img src="${prod.image}" class="product-img">
                            <div class="product-info">
                                <span class="product-brand">${prod.brand}</span>
                                <h3 class="product-name">${prod.name}</h3>
                                <span class="product-price">₹${prod.price}</span>
                            </div>
                        </a>
                    `;
                }
            } catch (e) {
                console.error("Failed to load products");
            }

            // Login Logic
            const loginBtn = document.getElementById('login-btn');
            const modal = document.getElementById('login-modal');
            const submitLogin = document.getElementById('submit-login');
            const cancelLogin = document.getElementById('cancel-login');

            // Check if already logged in
            if (localStorage.getItem('isSalesperson') === 'true') {
                loginBtn.textContent = "Logout";
            }

            loginBtn.addEventListener('click', () => {
                if (localStorage.getItem('isSalesperson') === 'true') {
                    localStorage.removeItem('isSalesperson');
                    localStorage.removeItem('salespersonName');
                    loginBtn.textContent = "Staff Login";
                    alert("Logged out successfully");
                } else {
                    modal.classList.add('active');
                }
            });

            cancelLogin.addEventListener('click', () => modal.classList.remove('active'));

            submitLogin.addEventListener('click', () => {
                const name = document.getElementById('staff-name').value;
                const pin = document.getElementById('staff-pin').value;

                if (pin === '1234') { // Hardcoded PIN for prototype
                    localStorage.setItem('isSalesperson', 'true');
                    localStorage.setItem('salespersonName', name);
                    modal.classList.remove('active');
                    loginBtn.textContent = "Logout";
                    alert(`Welcome, ${name}! Salesperson mode activated.`);
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
